<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>evo dashboard</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; height: 100%; font: 13px/1.5 -apple-system, system-ui, sans-serif; }
  body { padding: 12px 16px; box-sizing: border-box; }
  h1 { font-size: 14px; margin: 0 0 8px; font-weight: 600; }
  .stat { color: #888; margin-bottom: 10px; }
  .best { font-weight: 600; }
  table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 3px 8px 3px 0; white-space: nowrap; }
  th { color: #888; font-weight: 500; border-bottom: 1px solid #8884; }
  .bar { height: 6px; background: #4a90d9; border-radius: 3px; }
  .barcell { width: 120px; }
  .muted { color: #aaa; }
  .err { color: #c0392b; white-space: pre-wrap; }
  .committed { color: #2e7d32; } .evaluated { color: #b8860b; }
  .failed, .discarded { color: #c0392b; } .root { color: #888; }
</style>
</head>
<body>
<h1>evo experiment dashboard</h1>
<div id="stat" class="stat">connecting…</div>
<div id="body"><div class="muted">waiting for data…</div></div>

<script>
// Minimal MCP-UI client: JSON-RPC 2.0 over postMessage to the host frame.
(function () {
  const HOST = window.parent;
  let nextId = 1;
  const pending = new Map();

  function rpc(method, params) {
    const id = nextId++;
    HOST.postMessage({ jsonrpc: "2.0", id, method, params: params || {} }, "*");
    return new Promise((resolve, reject) => {
      const t = setTimeout(() => { pending.delete(id); reject(new Error(method + " timed out")); }, 15000);
      pending.set(id, { resolve, reject, t });
    });
  }
  function notify(method, params) {
    HOST.postMessage({ jsonrpc: "2.0", method, params: params || {} }, "*");
  }

  window.addEventListener("message", (ev) => {
    const d = ev.data;
    if (!d || d.jsonrpc !== "2.0" || d.id == null) return;
    const p = pending.get(d.id);
    if (!p) return;
    pending.delete(d.id); clearTimeout(p.t);
    if (d.error) p.reject(new Error(d.error.message || "rpc error"));
    else p.resolve(d.result);
  });

  // Unwrap an MCP tool result into a plain object.
  function toolData(result) {
    if (!result) return null;
    if (result.structuredContent) return result.structuredContent;
    const c = (result.content || []).find((x) => x.type === "text");
    if (c) { try { return JSON.parse(c.text); } catch (e) { return null; } }
    return null;
  }

  async function callTool(name, args) {
    const r = await rpc("tools/call", { name, arguments: args || {} });
    return toolData(r);
  }

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

  function render(data) {
    const graph = (data && data.graph) || {};
    let nodes = graph.nodes || {};
    if (Array.isArray(nodes)) { const m = {}; nodes.forEach((n) => (m[n.id] = n)); nodes = m; }
    const list = Object.values(nodes).filter((n) => n && n.id && n.id !== "root");
    const scored = list.filter((n) => typeof n.score === "number");
    const best = scored.reduce((b, n) => (b == null || n.score > b.score ? n : b), null);
    const metric = graph.metric || (data.frontier && data.frontier.metric) || "max";

    $("stat").innerHTML =
      `metric=${esc(metric)} · experiments=${list.length} · ` +
      `committed=${list.filter((n) => n.status === "committed").length} · ` +
      (best ? `<span class="best">best=${esc(best.id)} (${best.score})</span>` : "best=—");

    if (!list.length) { $("body").innerHTML = '<div class="muted">no experiments yet</div>'; return; }
    const maxS = Math.max(...scored.map((n) => n.score), 0.0001);
    const rows = list
      .sort((a, b) => (b.score ?? -1e9) - (a.score ?? -1e9))
      .map((n) => {
        const s = typeof n.score === "number" ? n.score : null;
        const w = s != null ? Math.max(2, Math.round((s / maxS) * 118)) : 0;
        const cls = (n.status || "").toLowerCase();
        return `<tr>
          <td class="${esc(cls)}">${esc(n.id)}</td>
          <td class="${esc(cls)}">${esc(n.status || "")}</td>
          <td>${s != null ? s : '<span class="muted">—</span>'}</td>
          <td class="barcell">${s != null ? `<div class="bar" style="width:${w}px"></div>` : ""}</td>
          <td class="muted">${esc((n.hypothesis || "").slice(0, 80))}</td>
        </tr>`;
      })
      .join("");
    $("body").innerHTML =
      `<table><thead><tr><th>id</th><th>status</th><th>score</th><th></th><th>hypothesis</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function refresh() {
    try {
      const data = await callTool("evo_get_graph", {});
      if (data) render(data);
    } catch (e) {
      $("stat").innerHTML = `<span class="err">refresh failed: ${esc(e.message)}</span>`;
      console.error("[evo-dashboard]", e);
    }
  }

  async function boot() {
    // MCP-UI lifecycle handshake; tolerate hosts that don't require it.
    try { await rpc("ui/initialize", {}); } catch (e) { console.warn("[evo-dashboard] ui/initialize:", e.message); }
    try { notify("notifications/initialized", {}); } catch (e) {}
    await refresh();
    setInterval(refresh, 4000);
  }
  boot();
})();
</script>
</body>
</html>
